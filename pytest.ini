[pytest]
# 测试文件搜索路径
testpaths = tests

# 测试文件命名规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 命令行参数
addopts =
    -v

# 标记表达式
markers =
    smoke: 冒烟测试
    regression: 回归测试
    login: 登录相关测试
    home: 首页相关测试
    ai: AI功能测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = [%(asctime)s.%(msecs)03d] [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 日志文件
log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = [%(asctime)s.%(msecs)03d] [%(levelname)s] %(filename)s:%(lineno)d - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# 超时配置 - 在 run.py 中通过 subprocess 控制超时
# 注意：pytest-timeout 的线程超时会导致 allure 结果无法写入
# timeout = 5

# 失败重跑配置 (需要安装 pytest-rerunfailures)
reruns = 2
reruns_delay = 2

# 并行执行配置 (需要安装 pytest-xdist)
# 使用方式：pytest -n auto
# numprocesses = auto

# 收集忽略
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    report
    logs
    data

# 过滤器
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
